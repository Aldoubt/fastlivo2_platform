/hik_camera_ros2_driver:
  ros__parameters:
    camera_info_url: "package://hik_camera_ros2_driver/config/camera_info.yaml"

    # Free-run mode is the default for backward compatibility.
    trigger_mode: false
    trigger_source: "Line0"
    trigger_activation: "RisingEdge"
    trigger_delay_us: 0.0

    acquisition_frame_rate_enable: true
    acquisition_frame_rate: 200.0

    exposure_auto: "Off"
    exposure_time: 5000.0

    gain_auto: "Off"
    gain: 12.0

    pixel_format: "RGB8Packed"
    adc_bit_depth: "Bits_8"
    use_sensor_data_qos: false

    camera_name: "left_camera"
    camera_topic: "left_camera/image"
