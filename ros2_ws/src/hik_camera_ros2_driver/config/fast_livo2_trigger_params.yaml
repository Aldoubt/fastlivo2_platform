/hik_camera_ros2_driver:
  ros__parameters:
    camera_info_url: "package://hik_camera_ros2_driver/config/camera_info.yaml"

    trigger_mode: true
    trigger_source: "Line0"
    trigger_activation: "FallingEdge"
    trigger_delay_us: 0.0

    # Ignored in trigger mode; the external pulse decides the actual frame rate.
    acquisition_frame_rate_enable: false
    acquisition_frame_rate: 10.0

    # FAST-LIVO2 direct visual alignment is happier with stable exposure.
    exposure_auto: "Off"
    exposure_time: 5000.0

    # Matches the FAST-LIVO2/LIV_handhold reference configuration.
    gain_auto: "Continuous"
    gain: 15.0

    pixel_format: "RGB8Packed"
    adc_bit_depth: "Bits_8"
    image_scale: 1.0 
    # FAST-LIVO2 subscribes with default QoS; keep default publisher QoS for compatibility.
    use_sensor_data_qos: false

    camera_name: "left_camera"
    frame_id: "left_camera_optical_frame"
    camera_topic: "left_camera/image"
